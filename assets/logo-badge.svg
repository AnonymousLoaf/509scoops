  <!-- disc -->
  <circle cx="120" cy="120" r="92" fill="#fff8ec" stroke="#6b4226" stroke-width="4"/>
  <circle cx="120" cy="120" r="82" fill="none" stroke="#8fd9c4" stroke-width="2" stroke-dasharray="3 5"/>

  <!-- waffle cone -->
  <path d="M95 165 L145 165 L120 193 Z" fill="#e8b968" stroke="#6b4226" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="103" y1="171" x2="115" y2="166" stroke="#a97a3a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="110" y1="179" x2="120" y2="174" stroke="#a97a3a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="137" y1="171" x2="125" y2="166" stroke="#a97a3a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- poop-swirl scoop -->
  <g stroke="#6b4226" stroke-width="3" stroke-linejoin="round">
    <ellipse cx="120" cy="148" rx="26" ry="17" fill="#6b4226"/>
    <ellipse cx="126" cy="124" rx="21" ry="15" fill="#7c4f2e"/>
    <ellipse cx="112" cy="104" rx="16" ry="12" fill="#6b4226"/>
