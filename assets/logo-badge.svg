  <ellipse cx="114" cy="86" rx="3.5" ry="4.3" fill="#fff"/>
  <ellipse cx="126" cy="86" rx="3.5" ry="4.3" fill="#fff"/>
  <circle cx="114" cy="87" r="1.8" fill="#2b1c10"/>
