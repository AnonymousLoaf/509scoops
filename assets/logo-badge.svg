       waffle cone with a cherry on top — the ice-cream-shop joke made
       unmistakable. Icon-only (no text) so it works as a favicon/profile
       photo; pair with logo-horizontal.svg where a wordmark is needed. -->

  <!-- sprinkle ring -->
  <g>
    <rect x="223.0" y="113.5" width="4" height="14" rx="2" fill="#ff8fa3" transform="rotate(-9 225.0 120.5)"/>
    <rect x="218.5" y="146.5" width="4" height="14" rx="2" fill="#8fd9c4" transform="rotate(-1 220.5 153.5)"/>
    <rect x="205.9" y="176.6" width="4" height="14" rx="2" fill="#ffd166" transform="rotate(40 207.9 183.6)"/>
    <rect x="186.1" y="200.6" width="4" height="14" rx="2" fill="#e63950" transform="rotate(28 188.1 207.6)"/>
    <rect x="160.3" y="217.7" width="4" height="14" rx="2" fill="#a78bfa" transform="rotate(67 162.3 224.7)"/>
    <rect x="130.9" y="226.6" width="4" height="14" rx="2" fill="#ff8fa3" transform="rotate(75 132.9 233.6)"/>
    <rect x="100.1" y="226.6" width="4" height="14" rx="2" fill="#8fd9c4" transform="rotate(76 102.1 233.6)"/>
    <rect x="70.7" y="217.7" width="4" height="14" rx="2" fill="#ffd166" transform="rotate(115 72.7 224.7)"/>
    <rect x="44.9" y="200.6" width="4" height="14" rx="2" fill="#e63950" transform="rotate(108 46.9 207.6)"/>
    <rect x="25.1" y="176.6" width="4" height="14" rx="2" fill="#a78bfa" transform="rotate(144 27.1 183.6)"/>
    <rect x="12.5" y="146.5" width="4" height="14" rx="2" fill="#ff8fa3" transform="rotate(142 14.5 153.5)"/>
    <rect x="8.0" y="113.5" width="4" height="14" rx="2" fill="#8fd9c4" transform="rotate(160 10.0 120.5)"/>
    <rect x="12.5" y="80.5" width="4" height="14" rx="2" fill="#ffd166" transform="rotate(193 14.5 87.5)"/>
    <rect x="25.1" y="50.4" width="4" height="14" rx="2" fill="#e63950" transform="rotate(229 27.1 57.4)"/>
    <rect x="44.9" y="27.4" width="4" height="14" rx="2" fill="#a78bfa" transform="rotate(210 46.9 34.4)"/>
    <rect x="70.7" y="10.3" width="4" height="14" rx="2" fill="#ff8fa3" transform="rotate(232 72.7 17.3)"/>
    <rect x="100.1" y="1.4" width="4" height="14" rx="2" fill="#8fd9c4" transform="rotate(268 102.1 8.4)"/>
    <rect x="130.9" y="1.4" width="4" height="14" rx="2" fill="#ffd166" transform="rotate(301 132.9 8.4)"/>
    <rect x="160.3" y="10.3" width="4" height="14" rx="2" fill="#e63950" transform="rotate(298 162.3 17.3)"/>
    <rect x="186.1" y="27.4" width="4" height="14" rx="2" fill="#a78bfa" transform="rotate(306 188.1 34.4)"/>
    <rect x="205.9" y="50.4" width="4" height="14" rx="2" fill="#ff8fa3" transform="rotate(351 207.9 57.4)"/>
