  <circle cx="106" cy="90" r="2.3" fill="#ff8fa3" opacity="0.6"/>
  <circle cx="134" cy="90" r="2.3" fill="#ff8fa3" opacity="0.6"/>
  <path d="M114 92 Q120 96 126 92" stroke="#2b1c10" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- cherry on top -->
  <path d="M120 62 Q117 54 109 50" stroke="#4a7c3f" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="105" cy="48" rx="5" ry="2.8" fill="#6fbf73" transform="rotate(-25 105 48)"/>
  <circle cx="120" cy="68" r="6.5" fill="#e63950" stroke="#a11f30" stroke-width="1.6"/>

  <!-- stink lines -->
  <path d="M92 55 Q97 46 92 40" stroke="#b0a89c" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M150 58 Q145 49 150 43" stroke="#b0a89c" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
